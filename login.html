<html lang="en">

    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-orange: #E8751A;
            --earth-red: #9E2A0E;
            --earth-brown: #6B3D1A;
            --earth-light: #9E7A52;
            --cream: #ffffff;
            --cream-light: #F5E8C8;
            --cream-gold: #EDCE8A;
            --peach: #F5C8A8;
            --dark: #2A1507;
        }
        
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #FBF0D9 0%, #F3E0B0 50%, #EACF80 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Organic blob decorations */
        .blob {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(232, 117, 26, .08);
            top: -100px;
            right: -100px;
            animation: float1 18s ease-in-out infinite;
        }
        
        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(158, 42, 14, .06);
            bottom: -80px;
            left: -80px;
            animation: float2 15s ease-in-out infinite;
        }
        
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 30px) scale(1.1); }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, -20px) scale(1.05); }
        }
        
        .login-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, .98) 0%, rgba(251, 240, 217, .98) 100%);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(158, 42, 14, .2);
            max-width: 460px;
            width: 100%;
            padding: 50px 45px;
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
            border: 2px solid rgba(245, 200, 168, .4);
            overflow: hidden;
        }
        
        /* Watercolor texture */
        .login-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 200, 168, .15) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(232, 117, 26, .1) 0%, rgba(245, 200, 168, .2) 100%);
            padding: 10px;
        }
        
        .logo img {
            width: 100%;
            height: auto;
        }
        
        .logo-text {
            font-size: 22px;
            color: var(--earth-red);
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -.3px;
        }
        
        .logo-tagline {
            font-size: 13px;
            color: var(--earth-light);
            font-weight: 400;
        }
        
        h1 {
            font-size: 26px;
            color: var(--dark);
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .subtitle {
            text-align: center;
            color: var(--earth-brown);
            margin-bottom: 35px;
            font-size: 14px;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        
        .form-group {
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(245, 200, 168, .6);
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, .8);
            color: var(--dark);
        }
        
        input:focus {
            outline: none;
            border-color: var(--earth-orange);
            background: white;
            box-shadow: 0 0 0 4px rgba(232, 117, 26, .1);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--earth-orange);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
            position: relative;
            z-index: 1;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(232, 117, 26, .4);
        }
        
        .btn-login:active {
            transform: translateY(-1px);
        }
        
        .error-message {
            background: linear-gradient(135deg, #FFE4E4 0%, #FFD0D0 100%);
            color: #C33;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #C33;
            position: relative;
            z-index: 1;
        }
        
        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .back-home {
            text-align: center;
            margin-top: 28px;
            position: relative;
            z-index: 1;
        }
        
        .back-home a {
            color: var(--earth-brown);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-home a:hover {
            color: var(--earth-orange);
        }
        
        @media (max-width: 600px) {
            .login-container {
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .logo {
                width: 85px;
                height: 85px;
            }
        }
    </style>
</head>

                console.log('Using fallback user database');
            }
        }
        
        initialize();
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (users[username]) {
                const user = users[username];
                
                if (user.password === password) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('userName', user.name);
                    
                    if (user.role === 'teacher') {
                        window.location.href = 'teacher-space.html';
                    } else {
                        window.location.href = 'field-officer-space.html';
                    }
                } else {
                    showError('Invalid password. Please try again.');
                }
            } else {
                showError('Username not found. Please check your username and try again.');
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
        
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
