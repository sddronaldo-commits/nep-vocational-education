<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #2C5F2D;
            --primary-dark: #1e4620;
            --primary-light: #97BC62;
            --accent: #FF6B35;
            --accent-light: #FFB49A;
            --neutral-50: #FAFAFA;
            --neutral-100: #F5F5F5;
            --neutral-200: #E8E8E8;
            --neutral-600: #6B7280;
            --neutral-800: #2D3748;
            --text-primary: #1A202C;
            --text-secondary: #4A5568;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--neutral-100) 0%, #FFF 50%, var(--neutral-100) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(44, 95, 45, 0.12);
            max-width: 440px;
            width: 100%;
            padding: 40px 35px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo-emoji {
            font-size: 26px;
        }
        .logo-text {
            font-size: 20px;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .logo-tagline {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 13px;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 13px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--neutral-200);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            background: var(--neutral-50);
            color: var(--text-primary);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            font-family: 'Poppins', sans-serif;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 95, 45, 0.25);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-message {
            background: #FEE;
            color: #C33;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            border-left: 3px solid #C33;
        }
        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">

            </div>
            <div class="logo-text">Lend A Hand India</div>
            <div class="logo-tagline">Building A Skilled Tomorrow</div>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Login to access NEP Vocational Education Portal</p>
        <div class="error-message" id="errorMessage"></div>

            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Login to Portal</button>
        </form>

        const errorMessage = document.getElementById('errorMessage');
        
        async function initialize() {
            const loaded = await loadUsersFromSheets();
            if (!loaded) {
                users = fallbackUsers;
                console.log('Using fallback user database');
            }
        }
        
        initialize();
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (users[username]) {
                const user = users[username];
                
                if (user.password === password) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('userName', user.name);
                    
                    if (user.role === 'teacher') {
                        window.location.href = 'teacher-space.html';
                    } else {
                        window.location.href = 'field-officer-space.html';
                    }
                } else {
                    showError('Invalid password. Please try again.');
                }
            } else {
                showError('Username not found. Please check your username and try again.');
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
        
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else {
                window.location.href = 'field-officer-space.html';
            }
