<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lend A Hand India</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #9ECAD6;
            --primary-slate: #748DAE;
            --primary-rose: #F5CBCB;
            --primary-blush: #FFEAEA;
            --text-dark: #3A4F5C;
            --text-medium: #5A6F7C;
        }
        
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, var(--primary-blush) 0%, #FFF 30%, var(--primary-cyan) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Organic blob decorations */
        .blob {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
        }
        
        .blob-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(245, 203, 203, .4) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            animation: float1 18s ease-in-out infinite;
        }
        
        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(116, 141, 174, .3) 0%, transparent 70%);
            bottom: -120px;
            left: -120px;
            animation: float2 15s ease-in-out infinite;
        }
        
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 40px) scale(1.1); }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -30px) scale(1.05); }
        }
        
        .login-container {
            background: rgba(255, 255, 255, .98);
            border-radius: 32px;
            box-shadow: 0 32px 80px rgba(116, 141, 174, .25);
            max-width: 480px;
            width: 100%;
            padding: 40px 50px;
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(158, 202, 214, .3);
            overflow: hidden;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 234, 234, .3) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .logo img {
            width: 100%;
            height: auto;
        }
        
        h1 {
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-medium);
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid rgba(158, 202, 214, .4);
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, .9);
            color: var(--text-dark);
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-slate);
            background: white;
            box-shadow: 0 0 0 4px rgba(116, 141, 174, .1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-slate) 0%, var(--primary-cyan) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Poppins', sans-serif;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 24px rgba(116, 141, 174, .25);
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(116, 141, 174, .35);
        }
        
        .btn-login:active {
            transform: translateY(-1px);
        }
        
        .error-message {
            background: linear-gradient(135deg, #FFE4E4 0%, #FFD0D0 100%);
            color: #C33;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #C33;
            position: relative;
            z-index: 1;
        }
        
        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .back-home {
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }
        
        .back-home a {
            color: var(--text-medium);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-home a:hover {
            color: var(--primary-slate);
        }
        
        @media (max-width: 600px) {
            .login-container {
                padding: 35px 30px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .logo {
                width: 95px;
                height: 95px;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>
        </div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Login to access your dashboard</p>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">Login →</button>
        </form>
        
        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        // Web App URL for authentication
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw1OrIX0j4E__anedReFAbjVrABpSDfKSSYj7xAgcYGaJVL-AdEpbderriLODCNgdw8Ng/exec';
        
        let users = {};
        
        // Fallback users in case web app is unavailable
        const fallbackUsers = {
            teacher1: { password: 'pass123', role: 'teacher', name: 'Teacher 1' },
            teacher2: { password: 'pass456', role: 'teacher', name: 'Teacher 2' },
            officer1: { password: 'off123', role: 'field_officer', name: 'Field Officer 1' }
        };
        
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        
        // Load users from Google Apps Script Web App
        async function loadUsersFromWebApp() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                if (data && data.users) {
                    users = data.users;
                    console.log('Loaded users from web app');
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error loading from web app:', error);
                return false;
            }
        }
        
        async function initialize() {
            const loaded = await loadUsersFromWebApp();
            if (!loaded) {
                users = fallbackUsers;
                console.log('Using fallback user database');
            }
        }
        
        initialize();
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (users[username]) {
                const user = users[username];
                
                if (user.password === password) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('userName', user.name);
                    
                    if (user.role === 'teacher') {
                        window.location.href = 'teacher-space.html';
                    } else {
                        window.location.href = 'field-officer-space.html';
                    }
                } else {
                    showError('Invalid password. Please try again.');
                }
            } else {
                showError('Username not found. Please check your username and try again.');
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
        
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else {
                window.location.href = 'field-officer-space.html';
            }
        }
    </script>
</body>
</html>
