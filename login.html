<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lend A Hand India</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(107, 68, 35, 0.15);
            max-width: 480px;
            width: 100%;
            padding: 50px 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #6B4423;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-emoji {
            font-size: 30px;
        }

        .logo-text {
            font-family: 'Libre Baskerville', serif;
            font-size: 24px;
            color: #6B4423;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo-tagline {
            font-size: 13px;
            color: #8B6F47;
            font-weight: 600;
        }

        h1 {
            font-family: 'Libre Baskerville', serif;
            font-size: 28px;
            color: #6B4423;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #8B6F47;
            margin-bottom: 35px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #6B4423;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8dcc8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Open Sans', sans-serif;
            background: #fafaf8;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #6B4423;
            background: white;
            box-shadow: 0 0 0 3px rgba(107, 68, 35, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #6B4423;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Open Sans', sans-serif;
        }

        .btn-login:hover {
            background: #8B6F47;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(107, 68, 35, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .role-info {
            background: #f5f0e8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #6B4423;
        }

        .role-info p {
            font-size: 13px;
            color: #6B4423;
            line-height: 1.6;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e8dcc8;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #8B6F47;
            font-size: 13px;
        }
    </style>
</head>
<body>

            </div>
            <div class="logo-text">Lend A Hand India</div>

        </div>

                    <option value="field_officer">Field Officer</option>

            <div class="form-group">

                <input type="text" id="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit" class="btn-login">Login to Portal</button>

        const roleSelect = document.getElementById('userRole');
        const roleInfo = document.getElementById('roleInfo');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        roleSelect.addEventListener('change', function() {
            if (this.value === 'teacher') {
                roleInfo.style.display = 'block';
                roleInfo.innerHTML = '<p><strong>Teachers:</strong> Access chapter reporting, student registration, and field visit management for Grades 6-9.</p>';
            } else if (this.value === 'field_officer') {
                roleInfo.style.display = 'block';
                roleInfo.innerHTML = '<p><strong>Field Officers:</strong> Manage school registration, teacher registration, and classroom observations.</p>';
            } else {
                roleInfo.style.display = 'none';
            }
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedRole = document.getElementById('userRole').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Check if user exists
            if (users[username]) {
                const user = users[username];
                
                // Verify password
                if (user.password === password) {
                    // Verify role matches
                    if (user.role === selectedRole) {
                        // Successful login
                        sessionStorage.setItem('loggedIn', 'true');
                        sessionStorage.setItem('username', username);
                        sessionStorage.setItem('userRole', user.role);
                        sessionStorage.setItem('userName', user.name);
                        
                        // Redirect to appropriate page
                        if (user.role === 'teacher') {
                            window.location.href = 'teacher-space.html';
                        } else {
                            window.location.href = 'field-officer-space.html';
                        }
                    } else {
                        showError('Selected role does not match your account. Please select the correct role.');
                    }
                } else {
                    showError('Invalid password. Please try again.');
                }
            } else {
                showError('Username not found. Please check your username and try again.');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Check if already logged in
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else {
                window.location.href = 'field-officer-space.html';
            }
        }
