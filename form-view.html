<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Lend A Hand India</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-orange: #E8751A;
            --earth-red: #9E2A0E;
            --earth-brown: #6B3D1A;
            --earth-light: #9E7A52;
            --cream: #ffffff;
            --cream-light: #F5E8C8;
            --peach: #F5C8A8;
            --dark: #2A1507;
        }
        
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* NAV */
        .header {
            background: rgba(251, 240, 217, .98);
            backdrop-filter: blur(18px);
            padding: 16px 40px;
            box-shadow: 0 2px 12px rgba(158, 42, 14, .1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(245, 200, 168, .4);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform .3s;
        }
        
        .logo-section:hover {
            transform: translateY(-2px);
        }
        
        .logo-img {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-img img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--earth-red);
            letter-spacing: -.3px;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .back-btn {
            background: linear-gradient(135deg, rgba(245, 232, 200, .8) 0%, rgba(237, 206, 138, .8) 100%);
            color: var(--earth-brown);
            padding: 10px 22px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all .3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 2px solid rgba(245, 200, 168, .4);
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, var(--cream-light) 0%, var(--cream-gold) 100%);
            transform: translateX(-3px);
            border-color: var(--peach);
        }
        
        .logout-btn {
            background: var(--earth-orange);
            color: white;
            padding: 10px 24px;
            border-radius: 100px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(232, 117, 26, .35);
        }
        
        .form-container {
            width: 100%;
            height: calc(100vh - 90px);
            background: white;
        }
        
        .form-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 12px 20px;
            }
            
            .logo-section {
                gap: 8px;
            }
            
            .logo-img {
                width: 45px;
                height: 45px;
            }
            
            .logo-text {
                display: none;
            }
            
            .nav {
                gap: 12px;
            }
            
            .back-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .logout-btn {
                padding: 8px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section" onclick="goBack()">
            <div class="logo-img">
                <img src="logo.png" alt="Logo">
            </div>
            <span class="logo-text">Lend A Hand India</span>
        </div>
        <div class="nav">
            <a href="#" onclick="goBack()" class="back-btn">← Back to Forms</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="form-container">
        <iframe id="formIframe" class="form-iframe" src=""></iframe>
    </div>

    <script>
        // Check if logged in
        if (sessionStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Get form URL from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const formUrl = urlParams.get('url');
        
        if (formUrl) {
            document.getElementById('formIframe').src = decodeURIComponent(formUrl);
        } else {
            alert('No form URL provided');
            goBack();
        }

        function goBack() {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else {
                window.location.href = 'field-officer-space.html';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
