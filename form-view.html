<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Lend A Hand India</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2C5F2D;
            --primary-dark: #1e4620;
            --primary-light: #97BC62;
            --neutral-50: #FAFAFA;
            --neutral-100: #F5F5F5;
            --text-primary: #1A202C;
            --text-secondary: #4A5568;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #FFF;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            box-shadow: 0 2px 10px rgba(44, 95, 45, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neutral-100);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
            font-weight: 600;
        }

        .logo-text p {
            font-size: 9px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .back-btn {
            background: var(--neutral-100);
            color: var(--text-primary);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: var(--neutral-100);
            transform: translateX(-3px);
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 95, 45, 0.25);
        }

        .form-container {
            width: 100%;
            height: calc(100vh - 75px);
            background: white;
        }

        .form-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 20px;
            }
            
            .logo-section {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section" onclick="goBack()">
            <div class="logo-img">
                <img src="logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="logo-text">
                <h1>Lend A Hand India</h1>
                <p>Building A Skilled Tomorrow</p>
            </div>
        </div>
        <div class="nav">
            <a href="#" onclick="goBack()" class="back-btn">← Back to Forms</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="form-container">
        <iframe id="formIframe" class="form-iframe" src=""></iframe>
    </div>

    <script>
        // Check if logged in
        if (sessionStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Get form URL from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const formUrl = urlParams.get('url');
        
        if (formUrl) {
            document.getElementById('formIframe').src = decodeURIComponent(formUrl);
        } else {
            alert('No form URL provided');
            goBack();
        }

        function goBack() {
            const role = sessionStorage.getItem('userRole');
            if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else {
                window.location.href = 'field-officer-space.html';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
