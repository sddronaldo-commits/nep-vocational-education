<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Lend A Hand India</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary-cyan:#9ECAD6;--primary-slate:#748DAE;--primary-rose:#F5CBCB;--primary-blush:#FFEAEA;--text-dark:#3A4F5C;--text-medium:#5A6F7C;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#fff;margin:0;padding:0;height:100vh;overflow:hidden;}
        .header{background:rgba(255,255,255,.98);backdrop-filter:blur(20px);padding:16px 40px;box-shadow:0 2px 12px rgba(158,202,214,.15);display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(158,202,214,.2);}
        .logo-section{display:flex;align-items:center;cursor:pointer;transition:transform .3s;}
        .logo-section:hover{transform:translateY(-2px);}
        .logo-img{width:55px;height:55px;display:flex;align-items:center;justify-content:center;}
        .logo-img img{width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(116,141,174,.15));}
        .nav{display:flex;gap:20px;align-items:center;}
        .back-btn{background:linear-gradient(135deg,rgba(158,202,214,.15) 0%,rgba(116,141,174,.15) 100%);color:var(--text-medium);padding:10px 22px;border-radius:50px;text-decoration:none;font-size:14px;font-weight:500;transition:all .3s;display:inline-flex;align-items:center;gap:6px;border:2px solid rgba(158,202,214,.3);}
        .back-btn:hover{background:linear-gradient(135deg,rgba(158,202,214,.25) 0%,rgba(116,141,174,.25) 100%);transform:translateX(-3px);border-color:var(--primary-cyan);}
        .logout-btn{background:linear-gradient(135deg,var(--primary-slate) 0%,var(--primary-cyan) 100%);color:white;padding:10px 24px;border-radius:50px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(116,141,174,.25);}
        .logout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(116,141,174,.35);}
        .form-container{width:100%;height:calc(100vh - 90px);background:white;}
        .form-iframe{width:100%;height:100%;border:none;}
        @media (max-width:768px){.header{padding:12px 20px;}.logo-img{width:45px;height:45px;}.nav{gap:12px;}.back-btn{padding:8px 16px;font-size:13px;}.logout-btn{padding:8px 18px;font-size:13px;}}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section" onclick="goBack()">
            <div class="logo-img"><img src="logo.png" alt="Logo"></div>
        </div>
        <div class="nav">
            <a href="#" onclick="goBack()" class="back-btn">← Back to Forms</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="form-container">
        <iframe id="formIframe" class="form-iframe" src=""></iframe>
    </div>
    <script>
        if(sessionStorage.getItem('loggedIn')!=='true'){window.location.href='login.html';}
        const urlParams=new URLSearchParams(window.location.search);
        const formUrl=urlParams.get('url');
        if(formUrl){document.getElementById('formIframe').src=decodeURIComponent(formUrl);}else{alert('No form URL provided');goBack();}
        function goBack(){const role=sessionStorage.getItem('userRole');if(role==='teacher'){window.location.href='teacher-space.html';}else{window.location.href='field-officer-space.html';}}
        function logout(){if(confirm('Are you sure you want to logout?')){sessionStorage.clear();window.location.href='login.html';}}
    </script>
</body>
</html>
